<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoC - Prevención en un Click (DAW)</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="panorama"></div>

  <div id="modal-riesgo">
    <h2>⚠️ Acción Incorrecta</h2>

    <div class="departamento">
      <strong>Identificación del Riesgo (FOL):</strong>
      <span id="texto-riesgo"></span>
    </div>

    <div class="departamento">
      <strong>Caracterización del Daño (Imagen Personal):</strong>
      <span id="texto-dano"></span>
    </div>

    <div class="departamento">
      <strong>Tratamiento y Cura (Sanidad):</strong>
      <span id="texto-cura"></span>
    </div>

    <button id="btn-cerrar" class="btn-cerrar">Entendido, volver al escenario</button>
  </div>

  <script src="main.js"></script>
</body>

</html>
